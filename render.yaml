services:
  - type: web
    name: postit-api
    env: docker
    dockerfilePath: ./Backend/PostIt/Dockerfile
    dockerContext: ./Backend/PostIt
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: postit-db
          property: connectionString
      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__Issuer
        sync: false   # Set to your Render API URL after deploy
      - key: Jwt__Audience
        sync: false   # Set to your Render API URL after deploy
      - key: OAuth2__Google__ClientId
        sync: false
      - key: OAuth2__Google__ClientSecret
        sync: false
      - key: OAuth2__Microsoft__ClientId
        sync: false
      - key: OAuth2__Microsoft__ClientSecret
        sync: false
      - key: Frontend__Url
        sync: false   # Set to your frontend Render URL after deploy

  - type: web
    name: postit-frontend
    env: node
    rootDir: ./Frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false   # Set to your Render API URL before first deploy (baked in at build time)

databases:
  - name: postit-db
    databaseName: postit
    user: postit_user
    plan: free
